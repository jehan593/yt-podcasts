name: Generate Podcast Feed
on:
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Podcast RSS
        uses: amandine-piazza/github-releases-to-podcast-rss@v1
        with:
          repo: "${{ github.repository }}"
          title: "My YouTube Audio"
          description: "Audio archived via Termux"
          image: "https://github.com/${{ github.repository_owner }}.png"
          output: "podcast.xml"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
